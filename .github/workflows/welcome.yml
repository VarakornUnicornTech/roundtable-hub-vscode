name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to RoundTable Hub! Thank you for your first issue.
            A maintainer will review this shortly. Please check our
            [Contributing Guide](https://github.com/VarakornUnicornTech/roundtable-hub-vscode/blob/main/CONTRIBUTING.md).
          pr-message: |
            Welcome to RoundTable Hub! Thank you for your first pull request.
            Please make sure `npm run lint` and `npm run compile` pass.
            A maintainer will review shortly.
