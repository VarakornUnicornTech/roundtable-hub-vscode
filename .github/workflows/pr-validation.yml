name: PR Validation

on:
  pull_request:
    branches: [main, staging, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for potential secrets
        run: |
          if grep -rn "ANTHROPIC_API_KEY\|sk-ant-\|api_key.*=.*['\"]" src/ *.md 2>/dev/null; then
            echo "::error::Potential secrets detected"
            exit 1
          fi
          echo "OK: No secrets found"

      - name: Validate package.json
        run: python3 -m json.tool package.json > /dev/null

  size-check:
    name: PR Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const total = pr.additions + pr.deletions;
            let label = '';
            if (total <= 10) label = 'size/XS';
            else if (total <= 50) label = 'size/S';
            else if (total <= 200) label = 'size/M';
            else if (total <= 500) label = 'size/L';
            else {
              label = 'size/XL';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `**PR Size Warning:** ${total} lines changed across ${pr.changed_files} files. Consider splitting.`,
              });
            }
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            } catch (e) { console.log(e.message); }
